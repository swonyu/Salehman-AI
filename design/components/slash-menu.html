<!doctype html><html><head><meta charset="utf-8"><style>
  :root{--accent:#FA2E4A;--accent2:#FF548C;--surface:#202020;--side:#181818;
        --hair:rgba(255,255,255,.12);--ok:#73D98C;--warn:#FFB859;
        --lux:cubic-bezier(.32,.72,0,1)}
  *{margin:0;box-sizing:border-box;font-family:-apple-system,'SF Pro Text',system-ui,sans-serif}
  body{background:var(--side);color:#fff;padding:48px;min-height:100vh}
  .bezel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
         border-radius:18px;padding:4px}
  .core{background:rgba(255,255,255,.045);border-radius:14px;
        border-top:1px solid rgba(255,255,255,.13);padding:16px}
  .eyebrow{display:inline-block;border-radius:999px;padding:3px 10px;font-size:10px;
           letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.55);
           border:1px solid var(--hair);margin-bottom:18px}
  h1{font-size:21px;font-weight:700;margin-bottom:6px}
  .sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:28px}
</style></head>
<body><span class="eyebrow">Salehman AI · Components</span>
<h1>Slash-command menu</h1><div class="sub">From the shipped app — exact DS tokens, not approximations.</div>

<div class="bezel" style="border-color:rgba(250,46,74,.28);max-width:480px"><div class="core" style="padding:5px">

 <div style="display:flex;gap:10px;align-items:center;padding:7px 11px;border-radius:7px;">
  <span style="color:#FA2E4A;font-size:12px;width:16px">❓</span>
  <span style="font-size:12.5px;font-weight:500">/explain</span>
  <span style="font-size:11.5px;color:rgba(255,255,255,.5)">Explain how it works</span>
  <span style="flex:1"></span><span style="font-size:11px;color:rgba(255,255,255,.45)">↵</span>
 </div>
 <div style="display:flex;gap:10px;align-items:center;padding:7px 11px;border-radius:7px;background:rgba(255,255,255,.06)">
  <span style="color:#FA2E4A;font-size:12px;width:16px">🪲</span>
  <span style="font-size:12.5px;font-weight:500">/fix</span>
  <span style="font-size:11.5px;color:rgba(255,255,255,.5)">Find and fix a bug</span>
  <span style="flex:1"></span>
 </div>
 <div style="display:flex;gap:10px;align-items:center;padding:7px 11px;border-radius:7px;">
  <span style="color:#FA2E4A;font-size:12px;width:16px">🧪</span>
  <span style="font-size:12.5px;font-weight:500">/tests</span>
  <span style="font-size:11.5px;color:rgba(255,255,255,.5)">Write unit tests</span>
  <span style="flex:1"></span>
 </div>
 <div style="display:flex;gap:10px;align-items:center;padding:7px 11px;border-radius:7px;">
  <span style="color:#FA2E4A;font-size:12px;width:16px">✂️</span>
  <span style="font-size:12.5px;font-weight:500">/refactor</span>
  <span style="font-size:11.5px;color:rgba(255,255,255,.5)">Refactor for clarity</span>
  <span style="flex:1"></span>
 </div>
</div></div></body></html>
