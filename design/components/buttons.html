<!doctype html><html><head><meta charset="utf-8"><style>
  :root{--accent:#FA2E4A;--accent2:#FF548C;--surface:#202020;--side:#181818;
        --hair:rgba(255,255,255,.12);--ok:#73D98C;--warn:#FFB859;
        --lux:cubic-bezier(.32,.72,0,1)}
  *{margin:0;box-sizing:border-box;font-family:-apple-system,'SF Pro Text',system-ui,sans-serif}
  body{background:var(--side);color:#fff;padding:48px;min-height:100vh}
  .bezel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
         border-radius:18px;padding:4px}
  .core{background:rgba(255,255,255,.045);border-radius:14px;
        border-top:1px solid rgba(255,255,255,.13);padding:16px}
  .eyebrow{display:inline-block;border-radius:999px;padding:3px 10px;font-size:10px;
           letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.55);
           border:1px solid var(--hair);margin-bottom:18px}
  h1{font-size:21px;font-weight:700;margin-bottom:6px}
  .sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:28px}
</style></head>

<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
