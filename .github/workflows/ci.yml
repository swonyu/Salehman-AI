name: CI

# Build + test the Salehman AI macOS app on every push / PR.
# NOTE: this app targets a very new macOS SDK ("Golden Gate"). GitHub-hosted
# macOS runners can lag the latest SDK — if the build step fails on an SDK/OS
# version (not code), switch `runs-on` to a self-hosted runner on your own Mac:
#     runs-on: [self-hosted, macOS]
# and register your Mac as a runner in the repo's Settings -> Actions -> Runners.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}   # manual run — use this to verify a freshly-registered self-hosted runner

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (macOS)
    # Self-hosted = your own Mac (which has the macOS 26.5 SDK). Register it:
    #   repo -> Settings -> Actions -> Runners -> New self-hosted runner -> macOS.
    # Until a runner is registered+online, pushed jobs sit "queued" (they don't fail;
    # they auto-expire in ~24h). To fall back to GitHub-hosted, set: runs-on: macos-latest
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5   # v4 bundles deprecated Node 20; v5+ runs on Node 24

      - name: Xcode / SDK info
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i macos || true

      - name: Build
        run: |
          set -o pipefail   # without this, tail's exit 0 masks an xcodebuild failure (false-green)
          xcodebuild -scheme "Salehman AI" \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log | tail -40

      - name: Test (math-invariant + full unit suite)
        run: |
          set -o pipefail
          xcodebuild test -scheme "Salehman AI" \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:"Salehman AITests" 2>&1 | tee test.log | tail -60
